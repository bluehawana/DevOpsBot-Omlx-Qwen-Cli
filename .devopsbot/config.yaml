# DevOpsBot config
# — max5 defaults to oMLX; Lundby (company) defaults to ollama.
# Switch branch or set DEVOPSBOT_PROVIDER=ollama as needed.
provider: omlx

github:
  repo: git@github.com:volvo-group/devopsbot-config.git
  branch: main
  skillsRepo: git@github.com:volvo-group/devopsbot-skills.git
  review:
    api: https://api.github.com
    defaultBranch: main

# Company Mac Studios — used when provider=ollama (Lundby)
macStudios:
  - name: Mac Studio 1
    host: BMC-F59GQX45NH.got.volvo.net
    user: harvad
    port: 22
  - name: Mac Studio 2
    host: BMC-XXXXXXXXXX.got.volvo.net   # TODO: replace with second studio's BMC hostname
    user: harvad
    port: 22

omlx:
  host: http://localhost:8000
  model: Huihui-Qwen3.6-35B-A3B-Claude-4.7-Opus-abliterated-mlx-8bit
  apiKey: omlx-a4qtcnh7r8e9p8vt

ollama:
  # Primary endpoint. Failover handled by llm-provider.js when multiple studios.
  host: http://BMC-F59GQX45NH.got.volvo.net:11434
  model: qwen3.6

copilot:
  enabled: true
  licenseType: business

skills:
  syncDir: .devopsbot/skills
  versionControl: true
